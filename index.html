<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swear Jar 🫙</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafaf8;
    --card: #ffffff;
    --card-soft: #f4f3ef;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --faint: #999994;
    --carmen-bg: #FAECE7;
    --carmen-fg: #993C1D;
    --carmen-strong: #D85A30;
    --vy-bg: #E1F5EE;
    --vy-fg: #0F6E56;
    --vy-strong: #1D9E75;
    --info-bg: #E6F1FB;
    --info-fg: #185FA5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --card: #252523;
      --card-soft: #2e2e2b;
      --border: rgba(255,255,255,0.1);
      --text: #f0f0ec;
      --muted: #999994;
      --faint: #6b6b6b;
      --carmen-bg: #4A1B0C;
      --carmen-fg: #F5C4B3;
      --vy-bg: #04342C;
      --vy-fg: #9FE1CB;
      --info-bg: #042C53;
      --info-fg: #85B7EB;
    }
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 500; text-align: center; margin-bottom: 0.25rem; }
  .subtitle { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-bottom: 1rem; }
  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 1.5rem; text-align: center; }
  .avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 20px; margin: 0 auto 0.75rem; }
  .avatar.carmen { background: var(--carmen-bg); color: var(--carmen-fg); }
  .avatar.vy { background: var(--vy-bg); color: var(--vy-fg); }
  .name { font-size: 18px; font-weight: 500; margin-bottom: 0.25rem; }
  .count-label { font-size: 12px; color: var(--muted); margin-bottom: 0.5rem; }
  .count { font-size: 48px; font-weight: 500; line-height: 1; margin-bottom: 0.25rem; }
  .dollar { font-size: 16px; color: var(--muted); margin-bottom: 1rem; }
  .coins { font-size: 26px; letter-spacing: 1px; min-height: 36px; margin-bottom: 1.25rem; word-break: break-all; line-height: 1.3; }
  .coins-empty { color: var(--faint); font-size: 14px; letter-spacing: normal; }
  .btn-row { display: flex; gap: 8px; justify-content: center; }
  button { border: 0.5px solid var(--border); background: var(--card); color: var(--text); border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer; transition: background 0.15s, opacity 0.15s; display: inline-flex; align-items: center; gap: 4px; font-family: inherit; }
  button:hover:not(:disabled) { background: var(--bg); }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-add-carmen { border-color: var(--carmen-strong); color: var(--carmen-strong); }
  .btn-add-vy { border-color: var(--vy-strong); color: var(--vy-strong); }
  .btn-cashout { border-color: var(--info-fg); color: var(--info-fg); padding: 8px 16px; }
  .total-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .total-label { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
  .total-amount { font-size: 22px; font-weight: 500; }
  .section-title { font-size: 13px; color: var(--muted); margin: 1.5rem 0 0.5rem; padding: 0 0.25rem; text-transform: lowercase; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .stat { background: var(--card-soft); border-radius: 8px; padding: 1rem; }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; line-height: 1.1; }
  .stat-sub { font-size: 11px; color: var(--faint); margin-top: 4px; }
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .split-card { background: var(--card-soft); border-radius: 8px; padding: 1rem; }
  .split-name { font-size: 13px; color: var(--muted); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .split-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .split-dot.carmen { background: var(--carmen-strong); }
  .split-dot.vy { background: var(--vy-strong); }
  .split-amount { font-size: 18px; font-weight: 500; }
  .split-pct { font-size: 11px; color: var(--faint); margin-top: 2px; }
  .bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 12px; background: var(--card-soft); }
  .bar-seg { height: 100%; transition: width 0.3s; }
  .bar-seg.carmen { background: var(--carmen-strong); }
  .bar-seg.vy { background: var(--vy-strong); }
  .log-item { font-size: 13px; color: var(--muted); padding: 6px 0.25rem; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; gap: 8px; }
  .log-item:last-child { border-bottom: none; }
  .log-when { color: var(--faint); font-size: 12px; white-space: nowrap; }
  .reset-row { text-align: center; margin-top: 1.5rem; }
  .reset-row button { font-size: 12px; color: var(--faint); border-color: transparent; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); border-radius: 8px; padding: 8px 16px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--card); border-radius: 12px; padding: 1.5rem; max-width: 380px; width: 100%; text-align: center; }
  .modal h3 { font-size: 17px; font-weight: 500; margin-bottom: 0.5rem; }
  .modal p { font-size: 14px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5; }
  .modal-row { display: flex; gap: 8px; justify-content: center; }
  .loading { text-align: center; color: var(--muted); padding: 2rem; font-size: 14px; }
</style>
</head>
<body>

<div class="wrap">
  <h1>🫙 Swear Jar</h1>
  <p class="subtitle">Each loonie = $1 CAD · cash out when the jar is full</p>

  <div id="app"><p class="loading">Loading jar...</p></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Cash out the jar?</h3>
    <p id="modal-text">This will empty the jar and add the total to your lifetime stats.</p>
    <div class="modal-row">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-cashout" onclick="confirmCashout()"><i class="ti ti-cash" aria-hidden="true"></i> Yes, cash out</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

let state = { carmen: 0, vy: 0 };
let log = [];
let lifetime = { carmen: 0, vy: 0 };
let cashouts = [];

function fmt(n) { return `$${n}.00`; }

function coins(n) {
  if (n <= 0) return '';
  return '🪙'.repeat(Math.min(n, 20)) + (n > 20 ? ` +${n - 20}` : '');
}

function timeNow() {
  return new Date().toLocaleString('en-CA', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

const BIN_ID = '6a0de2616877513b27a45432';
const API_KEY = '$2a$10$ONzy1gUV.wFbPiOuuUaFeOtqvkgDjYlKnl8O6MARwzr9EfbxJpe2u';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let saveTimer = null;
let isSaving = false;

async function pullRemote() {
  try {
    const res = await fetch(`${BIN_URL}/latest`, {
      headers: { 'X-Master-Key': API_KEY }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.record;
  } catch(e) {
    console.error('pull failed', e);
    return null;
  }
}

async function pushRemote() {
  try {
    isSaving = true;
    const payload = {
      state: state,
      lifetime: lifetime,
      log: log.slice(0, 30),
      cashouts: cashouts.slice(0, 20)
    };
    const res = await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) {
    console.error('push failed', e);
    showToast('Sync failed — check connection');
  } finally {
    isSaving = false;
  }
}

async function save() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(pushRemote, 300);
}

async function load() {
  const remote = await pullRemote();
  if (remote) {
    if (remote.state) state = remote.state;
    if (remote.lifetime) lifetime = remote.lifetime;
    if (remote.log) log = remote.log;
    if (remote.cashouts) cashouts = remote.cashouts;
  }
}

setInterval(async () => {
  if (isSaving || saveTimer) return;
  const remote = await pullRemote();
  if (!remote) return;
  const changed =
    JSON.stringify(remote.state) !== JSON.stringify(state) ||
    JSON.stringify(remote.lifetime) !== JSON.stringify(lifetime) ||
    (remote.log && remote.log.length !== log.length) ||
    (remote.cashouts && remote.cashouts.length !== cashouts.length);
  if (changed) {
    if (remote.state) state = remote.state;
    if (remote.lifetime) lifetime = remote.lifetime;
    if (remote.log) log = remote.log;
    if (remote.cashouts) cashouts = remote.cashouts;
    render();
  }
}, 5000);

async function add(person) {
  state[person]++;
  lifetime[person]++;
  log.unshift({ t: timeNow(), msg: `${person === 'carmen' ? 'Carmen' : 'Vy'} dropped a loonie` });
  await save();
  render();
  showToast(`+$1 for ${person === 'carmen' ? 'Carmen' : 'Vy'}`);
}

async function remove(person) {
  if (state[person] <= 0) return;
  state[person]--;
  lifetime[person] = Math.max(0, lifetime[person] - 1);
  log.unshift({ t: timeNow(), msg: `${person === 'carmen' ? 'Carmen' : 'Vy'} took one back` });
  await save();
  render();
  showToast(`-$1 from ${person === 'carmen' ? 'Carmen' : 'Vy'}`);
}

function openCashout() {
  const total = state.carmen + state.vy;
  if (total <= 0) { showToast('Jar is already empty'); return; }
  document.getElementById('modal-text').textContent =
    `Empty the jar's ${fmt(total)} and add it to your lifetime stats? The current jar resets to $0 but lifetime totals stay.`;
  document.getElementById('modal-bg').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('show');
}

async function confirmCashout() {
  const total = state.carmen + state.vy;
  if (total <= 0) { closeModal(); return; }
  cashouts.unshift({
    t: timeNow(),
    total: total,
    carmen: state.carmen,
    vy: state.vy
  });
  log.unshift({ t: timeNow(), msg: `Cashed out ${fmt(total)} 💰` });
  state.carmen = 0;
  state.vy = 0;
  await save();
  closeModal();
  render();
  showToast(`Cashed out ${fmt(total)}!`);
}

async function resetLifetime() {
  if (!confirm('Reset lifetime stats and cashout history? This cannot be undone.')) return;
  lifetime = { carmen: 0, vy: 0 };
  cashouts = [];
  log = [];
  await save();
  render();
  showToast('Lifetime stats reset');
}

function render() {
  const total = state.carmen + state.vy;
  const ltTotal = lifetime.carmen + lifetime.vy;
  const carmenPct = ltTotal > 0 ? Math.round((lifetime.carmen / ltTotal) * 100) : 0;
  const vyPct = ltTotal > 0 ? 100 - carmenPct : 0;
  const lastCashout = cashouts[0];

  document.getElementById('app').innerHTML = `
    <div class="grid">
      <div class="card">
        <div class="avatar carmen">C</div>
        <div class="name">Carmen</div>
        <div class="count-label">loonies in the jar</div>
        <div class="count">${state.carmen}</div>
        <div class="dollar">${fmt(state.carmen)}</div>
        <div class="coins">${state.carmen > 0 ? coins(state.carmen) : '<span class="coins-empty">empty</span>'}</div>
        <div class="btn-row">
          <button onclick="remove('carmen')" ${state.carmen === 0 ? 'disabled' : ''}><i class="ti ti-minus" aria-hidden="true"></i> remove</button>
          <button class="btn-add-carmen" onclick="add('carmen')"><i class="ti ti-coin" aria-hidden="true"></i> add loonie</button>
        </div>
      </div>
      <div class="card">
        <div class="avatar vy">V</div>
        <div class="name">Vy</div>
        <div class="count-label">loonies in the jar</div>
        <div class="count">${state.vy}</div>
        <div class="dollar">${fmt(state.vy)}</div>
        <div class="coins">${state.vy > 0 ? coins(state.vy) : '<span class="coins-empty">empty</span>'}</div>
        <div class="btn-row">
          <button onclick="remove('vy')" ${state.vy === 0 ? 'disabled' : ''}><i class="ti ti-minus" aria-hidden="true"></i> remove</button>
          <button class="btn-add-vy" onclick="add('vy')"><i class="ti ti-coin" aria-hidden="true"></i> add loonie</button>
        </div>
      </div>
    </div>

    <div class="total-card">
      <div>
        <div class="total-label">in the jar right now</div>
        <div class="total-amount">${fmt(total)}</div>
      </div>
      <button class="btn-cashout" onclick="openCashout()" ${total === 0 ? 'disabled' : ''}>
        <i class="ti ti-cash" aria-hidden="true"></i> cash out
      </button>
    </div>

    <div class="section-title">lifetime stats</div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">total accumulated</div>
        <div class="stat-value">${fmt(ltTotal)}</div>
        <div class="stat-sub">${ltTotal} loonies all-time</div>
      </div>
      <div class="stat">
        <div class="stat-label">times cashed out</div>
        <div class="stat-value">${cashouts.length}</div>
        <div class="stat-sub">${lastCashout ? `last: ${fmt(lastCashout.total)} on ${lastCashout.t}` : 'never cashed out yet'}</div>
      </div>
    </div>

    <div class="split">
      <div class="split-card">
        <div class="split-name"><span class="split-dot carmen"></span> Carmen's lifetime</div>
        <div class="split-amount">${fmt(lifetime.carmen)}</div>
        <div class="split-pct">${carmenPct}% of total</div>
      </div>
      <div class="split-card">
        <div class="split-name"><span class="split-dot vy"></span> Vy's lifetime</div>
        <div class="split-amount">${fmt(lifetime.vy)}</div>
        <div class="split-pct">${vyPct}% of total</div>
      </div>
    </div>

    ${ltTotal > 0 ? `
      <div class="bar">
        <div class="bar-seg carmen" style="width: ${carmenPct}%"></div>
        <div class="bar-seg vy" style="width: ${vyPct}%"></div>
      </div>
    ` : ''}

    ${cashouts.length > 0 ? `
      <div class="section-title">cashout history</div>
      <div>
        ${cashouts.slice(0, 5).map(c => `
          <div class="log-item">
            <span><i class="ti ti-cash" aria-hidden="true" style="font-size: 14px; vertical-align: -2px;"></i> ${fmt(c.total)} cashed out (C: ${fmt(c.carmen)}, V: ${fmt(c.vy)})</span>
            <span class="log-when">${c.t}</span>
          </div>
        `).join('')}
      </div>
    ` : ''}

    ${log.length > 0 ? `
      <div class="section-title">recent activity</div>
      <div>
        ${log.slice(0, 8).map(l => `
          <div class="log-item">
            <span>${l.msg}</span>
            <span class="log-when">${l.t}</span>
          </div>
        `).join('')}
      </div>
    ` : ''}

    ${ltTotal > 0 || cashouts.length > 0 ? `
      <div class="reset-row">
        <button onclick="resetLifetime()"><i class="ti ti-refresh" aria-hidden="true"></i> reset lifetime stats</button>
      </div>
    ` : ''}
  `;
}

async function init() {
  await load();
  render();
}

init();
</script>
</body>
</html>
